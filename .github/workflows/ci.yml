name: CI — Lint, Security & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest pytest-cov bandit pip-audit

      - name: Lint with flake8
        run: |
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: SAST with Bandit
        run: |
          bandit -r backend --severity-level medium --confidence-level medium --exclude backend/tests -f txt -o bandit-report.txt || true
          cat bandit-report.txt
          bandit -r backend --severity-level high --confidence-level medium --exclude backend/tests -q

      - name: SCA with pip-audit
        run: |
          pip-audit -r backend/requirements.txt --output-format json --output pip-audit-report.json || true
          pip-audit -r backend/requirements.txt || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.txt
            pip-audit-report.json
          retention-days: 30

      - name: Run tests with pytest
        run: |
          pytest backend/tests/ -v --tb=short --cov=backend --cov-report=term-missing
        env:
          ENV: test
          DB_PATH: ":memory:"
          PYTHONPATH: backend